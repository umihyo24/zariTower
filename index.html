<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crayfish Rogue-lite Survival</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <header class="hud-top">
      <h1>Crayfish Evolution: Survival</h1>
      <p>Move: WASD / Arrows • Survive as long as possible</p>
    </header>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="960" height="540" aria-label="Crayfish survival game"></canvas>

      <div id="levelupModal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="levelupTitle">
        <div class="panel">
          <h2 id="levelupTitle">Level Up! Choose a Mutation</h2>
          <div id="mutationOptions" class="mutation-options"></div>
        </div>
      </div>

      <div id="gameOverModal" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
        <div class="panel">
          <h2 id="gameOverTitle">You Were Overrun</h2>
          <p id="finalStats"></p>
          <button id="restartBtn" type="button">Restart</button>
        </div>
      </div>
    </section>

    <footer class="hud-bottom">
      <p>Mutation effects stack. Auto-attack hits the nearest enemy in range.</p>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
